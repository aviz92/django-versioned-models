[pytest]
log_cli = true
log_cli_level = DEBUG
testpaths = tests
pythonpath = . django_versioned_models
DJANGO_SETTINGS_MODULE = config.settings

addopts =
;    --collect-only
    -s
    -v
    -ra
    --strict-markers
    --tb=short

    --better-report


markers =
    example: Marker for tests example.
